kind = "mobile"
previewPath = "/"
title = "Portfolio Tracker"
version = "1.0.0"
id = "artifacts/portfolio-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20739

[services.development]
run = "pnpm --filter @workspace/portfolio-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/portfolio-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/portfolio-tracker", "run", "serve" ]

[services.env]
PORT = "20739"
BASE_PATH = "/"
