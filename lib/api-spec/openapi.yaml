openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Portfolio Tracker API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: accounts
    description: Trading account operations
  - name: positions
    description: Position/holding operations
  - name: activities
    description: Trade activity operations
  - name: market
    description: Market data operations
  - name: anthropic
    description: Anthropic AI chat operations
  - name: order-suggestions
    description: Order suggestion operations
  - name: alerts
    description: Persisted risk alert operations
  - name: portfolio-policy
    description: Portfolio-level IPS policy snapshot
  - name: convictions
    description: Conviction feed — signal capture, Claude analysis, approval
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List all trading accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create a new trading account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountBody"
      responses:
        "201":
          description: Created account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get account details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateAccount
      tags: [accounts]
      summary: Update account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountBody"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /accounts/{id}/positions:
    get:
      operationId: listAccountPositions
      tags: [positions]
      summary: List positions for an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  /positions/history:
    get:
      operationId: getPositionHistory
      tags: [positions]
      summary: Sleeve-level position history aggregation
      parameters:
        - name: accountId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, all]
            default: all
      responses:
        "200":
          description: Sleeve-level history summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PositionHistorySleeve"

  /positions/history/{ticker}:
    get:
      operationId: getPositionHistoryByTicker
      tags: [positions]
      summary: Position-level history detail for a ticker in an account
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
        - name: accountId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Position history detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionHistoryDetail"
        "400":
          description: Missing accountId
        "404":
          description: Position not found

  /positions:
    post:
      operationId: createPosition
      tags: [positions]
      summary: Create a new position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePositionBody"
      responses:
        "201":
          description: Created position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Position"

  /positions/{id}:
    put:
      operationId: updatePosition
      tags: [positions]
      summary: Update position
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePositionBody"
      responses:
        "200":
          description: Updated position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Position"
    delete:
      operationId: deletePosition
      tags: [positions]
      summary: Delete position
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List all trade activities
      parameters:
        - name: accountId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeActivity"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Log a trade activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityBody"
      responses:
        "201":
          description: Created activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeActivity"

  /activities/{id}:
    delete:
      operationId: deleteActivity
      tags: [activities]
      summary: Delete activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /market/quote/{symbol}:
    get:
      operationId: getMarketQuote
      tags: [market]
      summary: Get stock quote
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketQuote"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /market/chart/{symbol}:
    get:
      operationId: getMarketChart
      tags: [market]
      summary: Get stock chart data
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: interval
          in: query
          schema:
            type: string
            default: "1d"
        - name: range
          in: query
          schema:
            type: string
            default: "1mo"
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartData"

  /market/indices:
    get:
      operationId: getMarketIndices
      tags: [market]
      summary: Get major market indices
      responses:
        "200":
          description: Market indices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketQuote"

  /market/screener:
    get:
      operationId: screenStocks
      tags: [market]
      summary: Screen stocks for swing trading
      parameters:
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: minVolume
          in: query
          schema:
            type: number
        - name: sector
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of screened stocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScreenerResult"

  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [accounts]
      summary: Get overall portfolio NAV and summary
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"

  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"

  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /order-suggestions/generate:
    post:
      operationId: generateOrderSuggestions
      tags: [order-suggestions]
      summary: Run suggestion engine and persist results
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateOrderSuggestionsBody"
      responses:
        "200":
          description: All pending suggestions after generation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSuggestion"

  /order-suggestions:
    get:
      operationId: listOrderSuggestions
      tags: [order-suggestions]
      summary: List order suggestions
      parameters:
        - name: accountId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, dismissed, executed]
      responses:
        "200":
          description: List of order suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSuggestion"

  /order-suggestions/{id}:
    patch:
      operationId: updateOrderSuggestion
      tags: [order-suggestions]
      summary: Update suggestion status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderSuggestionBody"
      responses:
        "200":
          description: Updated suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderSuggestion"

  /alerts/generate:
    post:
      operationId: generateAlerts
      tags: [alerts]
      summary: Run alert engine and upsert alerts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAlertsBody"
      responses:
        "200":
          description: Active alerts after generation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List alerts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, acknowledged, resolved]
        - name: accountId
          in: query
          schema:
            type: integer
        - name: positionId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /portfolio-policy:
    get:
      operationId: getPortfolioPolicy
      tags: [portfolio-policy]
      summary: Get portfolio-level IPS policy snapshot
      responses:
        "200":
          description: Portfolio policy (empty object if not yet configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioPolicy"
    put:
      operationId: updatePortfolioPolicy
      tags: [portfolio-policy]
      summary: Upsert portfolio-level IPS policy fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePortfolioPolicyBody"
      responses:
        "200":
          description: Updated portfolio policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioPolicy"

  /alerts/{id}:
    patch:
      operationId: updateAlert
      tags: [alerts]
      summary: Acknowledge or resolve an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAlertBody"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"


  /convictions:
    get:
      tags:
        - convictions
      summary: List convictions
      operationId: listConvictions
      parameters:
        - name: proposal_status
          in: query
          schema:
            type: string
            enum: [PROCESSING, PENDING_REVIEW, APPROVED, REJECTED]
        - name: ticker
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of convictions with attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConvictionWithAttachments"
    post:
      tags:
        - convictions
      summary: Create conviction (multipart/form-data)
      operationId: createConviction
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - source_type
              properties:
                source_type:
                  type: string
                  enum: [NEWS, VIDEO, PERSON, OWN_THESIS]
                source_url:
                  type: string
                source_name:
                  type: string
                raw_note:
                  type: string
                tickers:
                  type: string
                  description: JSON array string e.g. '["AAPL","TSLA"]'
                themes:
                  type: string
                  description: JSON array string e.g. '["macro","rates"]'
                screenshots:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: Conviction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvictionWithAttachments"

  /convictions/{id}:
    get:
      tags:
        - convictions
      summary: Get conviction by ID
      operationId: getConviction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conviction detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvictionWithAttachments"
        "404":
          description: Not found

  /convictions/{id}/status:
    get:
      tags:
        - convictions
      summary: Poll conviction processing status
      operationId: getConvictionStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvictionStatus"

  /convictions/{id}/approve:
    patch:
      tags:
        - convictions
      summary: Approve conviction
      operationId: approveConviction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  conviction:
                    $ref: "#/components/schemas/ConvictionWithAttachments"
                  actionId:
                    type: integer
                    nullable: true

  /convictions/{id}/reject:
    patch:
      tags:
        - convictions
      summary: Reject conviction
      operationId: rejectConviction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rejection_reason:
                  type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvictionWithAttachments"

  /convictions/{id}/attachments/{attachmentId}:
    delete:
      tags:
        - convictions
      summary: Delete attachment
      operationId: deleteConvictionAttachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Account:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        broker:
          type: string
        accountType:
          type: string
          enum: [long_term, swing, day_trading, savings]
        currency:
          type: string
        initialBalance:
          type: number
        currentBalance:
          type: number
        sleeveKey:
          type: string
          nullable: true
        maxLeverageRatio:
          type: number
          nullable: true
        ipsVersion:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - broker
        - accountType
        - currency
        - initialBalance
        - currentBalance
        - createdAt
        - updatedAt

    CreateAccountBody:
      type: object
      properties:
        name:
          type: string
        broker:
          type: string
        accountType:
          type: string
          enum: [long_term, swing, day_trading, savings]
        currency:
          type: string
        initialBalance:
          type: number
      required:
        - name
        - broker
        - accountType
        - currency
        - initialBalance

    UpdateAccountBody:
      type: object
      properties:
        name:
          type: string
        broker:
          type: string
        accountType:
          type: string
          enum: [long_term, swing, day_trading, savings]
        currentBalance:
          type: number
        sleeveKey:
          type: string
          nullable: true
        maxLeverageRatio:
          type: number
          nullable: true
        ipsVersion:
          type: string

    Position:
      type: object
      properties:
        id:
          type: integer
        accountId:
          type: integer
        symbol:
          type: string
        name:
          type: string
        quantity:
          type: number
        avgCost:
          type: number
        currentPrice:
          type: number
        marketValue:
          type: number
        unrealizedPnl:
          type: number
        unrealizedPnlPct:
          type: number
        dayChange:
          type: number
        dayChangePct:
          type: number
        assetType:
          type: string
          enum: [stock, etf, crypto, commodity, bond, reit, forex, index]
        sector:
          type: string
        notes:
          type: string
        positionBucket:
          type: string
          enum: [core, swing, spec, def, anchor, inc, cut]
          nullable: true
        ipsAction:
          type: string
          enum: [hold, add, trim, monitor, cut, exit]
          nullable: true
        stopPrice:
          type: number
          nullable: true
        targetPrice:
          type: number
          nullable: true
        addZoneLow:
          type: number
          nullable: true
        addZoneHigh:
          type: number
          nullable: true
        cutListAddedAt:
          type: string
          format: date-time
          nullable: true
        policyNote:
          type: string
          nullable: true
        ipsVersion:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - accountId
        - symbol
        - name
        - quantity
        - avgCost
        - currentPrice
        - marketValue
        - unrealizedPnl
        - unrealizedPnlPct
        - dayChange
        - dayChangePct
        - createdAt
        - updatedAt

    CreatePositionBody:
      type: object
      properties:
        accountId:
          type: integer
        symbol:
          type: string
        name:
          type: string
        quantity:
          type: number
        avgCost:
          type: number
        assetType:
          type: string
          enum: [stock, etf, crypto, commodity, bond, reit, forex, index]
        sector:
          type: string
        notes:
          type: string
        positionBucket:
          type: string
          enum: [core, swing, spec, def, anchor, inc, cut]
        ipsAction:
          type: string
          enum: [hold, add, trim, monitor, cut, exit]
        stopPrice:
          type: number
        addZoneLow:
          type: number
        addZoneHigh:
          type: number
        cutListAddedAt:
          type: string
          format: date-time
        policyNote:
          type: string
        ipsVersion:
          type: string
      required:
        - accountId
        - symbol
        - name
        - quantity
        - avgCost

    UpdatePositionBody:
      type: object
      properties:
        quantity:
          type: number
        avgCost:
          type: number
        currentPrice:
          type: number
        assetType:
          type: string
          enum: [stock, etf, crypto, commodity, bond, reit, forex, index]
        notes:
          type: string
        positionBucket:
          type: string
